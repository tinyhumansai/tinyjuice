name: Bug Report
description: Report behavior that is broken, surprising, or undocumented.
title: "Bug: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a TinyJuice bug. Please include a minimal reproduction when possible.
  - type: input
    id: version
    attributes:
      label: TinyJuice version or commit
      placeholder: "0.1.0 or commit SHA"
    validations:
      required: true
  - type: input
    id: rust
    attributes:
      label: Rust toolchain
      placeholder: "rustc --version"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction
      description: Include code, commands, or a repository link.
      placeholder: |
        cargo test ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Logs, traces, screenshots, or related docs.
